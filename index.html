<!DOCTYPE html>
<html>
<head>
    <title>HaxBall Pro P2P</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Verdana', sans-serif; margin: 0; padding: 0; overflow: hidden; touch-action: none; user-select: none; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; text-align: center; z-index: 10; border: 2px solid #555; width: 300px; }
        #menu h2 { margin-top: 0; color: #4caf50; }
        .id-box { background: #333; padding: 10px; border-radius: 5px; margin: 15px 0; word-break: break-all; font-family: monospace; color: #ffeb3b; border: 1px solid #555; }
        input { padding: 12px; width: 100%; border-radius: 5px; border: 1px solid #555; background: #222; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { padding: 12px 20px; background: #4caf50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background: #66bb6a; }
        #status { margin-top: 15px; font-weight: bold; }
        #score { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 32px; font-weight: bold; z-index: 5; font-family: monospace; display: flex; gap: 20px; text-shadow: 2px 2px 0 #000; }
        #score .red { color: #ff4444; }
        #score .blue { color: #4444ff; }
        canvas { background: #2d5a27; display: block; }
        
        /* Mobile UI */
        #touch-controls { display: none; position: absolute; bottom: 30px; left: 0; width: 100%; height: 150px; z-index: 6; pointer-events: none; }
        #joystick-zone { position: absolute; bottom: 0; left: 0; width: 50%; height: 100%; pointer-events: auto; }
        #kick-zone { position: absolute; bottom: 0; right: 0; width: 50%; height: 100%; pointer-events: auto; display: flex; justify-content: center; align-items: center; }
        #kick-btn { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 3px solid white; border-radius: 50%; pointer-events: auto; }
        #kick-btn.active { background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div id="menu">
        <h2>HAXBALL PRO</h2>
        <div id="setup-host">
            <p>O TEU ID DE SALA:</p>
            <div id="my-id" class="id-box">A gerar...</div>
            <p style="font-size: 12px; color: #aaa;">Partilha este ID com o teu amigo(a)</p>
        </div>
        <div style="margin: 20px 0; border-top: 1px solid #555;"></div>
        <div id="setup-client">
            <input type="text" id="peer-id" placeholder="Colar ID do Amigo">
            <button onclick="connectAsClient()">CONECTAR</button>
        </div>
        <p id="status">A aguardar ligação...</p>
    </div>

    <div id="score">
        <span class="red" id="score-red">0</span>
        <span>-</span>
        <span class="blue" id="score-blue">0</span>
    </div>

    <canvas id="game"></canvas>

    <div id="touch-controls">
        <div id="joystick-zone"></div>
        <div id="kick-zone">
            <div id="kick-btn"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO CONSTANTES ---
        const C = {
            W: 1000, H: 600, // Dimensões lógicas do campo
            R_PLAYER: 18, R_BALL: 12, // Raios
            P_SPEED: 5.5, P_ACCEL: 0.5, P_DRAG: 0.93, // Física Jogador
            B_DRAG: 0.992, B_BOUNCE: 0.8, // Física Bola
            KICK_FORCE: 12, KICK_RANGE: 3, // Força e alcance do chuto
            POST_R: 8, GOAL_W: 150 // Balizas
        };

        // --- ESTADO DO JOGO ---
        let game = {
            p1: { x: C.W*0.2, y: C.H/2, vx: 0, vy: 0, color: '#ff4444', kicking: false, kickT: 0, input: {} },
            p2: { x: C.W*0.8, y: C.H/2, vx: 0, vy: 0, color: '#4444ff', kicking: false, kickT: 0, input: {} },
            ball: { x: C.W/2, y: C.H/2, vx: 0, vy: 0 },
            score: { red: 0, blue: 0 },
            posts: [
                {x: 50, y: C.H/2 - C.GOAL_W/2, type: 'red'}, {x: 50, y: C.H/2 + C.GOAL_W/2, type: 'red'},
                {x: C.W-50, y: C.H/2 - C.GOAL_W/2, type: 'blue'}, {x: C.W-50, y: C.H/2 + C.GOAL_W/2, type: 'blue'}
            ],
            isHost: false, goalScored: false
        };

        // --- SETUP REDE (PEERJS) ---
        let peer = new Peer(), conn;
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Host (PC) recebe ligação
        peer.on('connection', c => {
            if (conn) return; // Apenas 1 ligação
            conn = c; game.isHost = true;
            document.getElementById('setup-client').style.display = 'none';
            setupConnection();
        });

        // Cliente (Mobile) conecta
        function connectAsClient() {
            if (conn) return;
            let id = document.getElementById('peer-id').value.trim();
            if(!id) return;
            conn = peer.connect(id);
            document.getElementById('setup-host').style.display = 'none';
            conn.on('open', setupConnection);
        }

        function setupConnection() {
            document.getElementById('menu').style.display = 'none';
            if (!game.isHost && isMobile()) document.getElementById('touch-controls').style.display = 'block';
            
            conn.on('data', data => {
                if (game.isHost) game.p2.input = data; // Recebe inputs de P2
                else syncGame(data); // Recebe estado do jogo
            });
        }

        function syncGame(data) {
            game.p1 = data.p1; game.p2 = data.p2; game.ball = data.ball;
            if (game.score.red !== data.score.red || game.score.blue !== data.score.blue) {
                game.score = data.score; updateScore();
            }
        }

        // --- SETUP CANVAS & RENDER ---
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        function resize() {
            let scale = Math.min(window.innerWidth / C.W, window.innerHeight / C.H) * 0.95;
            canvas.width = C.W * scale; canvas.height = C.H * scale;
            ctx.scale(scale, scale);
        }
        window.addEventListener('resize', resize); resize();

        function draw() {
            ctx.clearRect(0, 0, C.W, C.H);
            // Campo, Linhas e Balizas
            ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 3;
            ctx.strokeRect(50, 50, C.W-100, C.H-100);
            ctx.beginPath(); ctx.moveTo(C.W/2, 50); ctx.lineTo(C.W/2, C.H-50); ctx.stroke();
            ctx.beginPath(); ctx.arc(C.W/2, C.H/2, 80, 0, Math.PI*2); ctx.stroke();
            
            // Balizas
            ctx.fillStyle = "#ff4444"; ctx.fillRect(10, C.H/2 - C.GOAL_W/2, 40, C.GOAL_W);
            ctx.fillStyle = "#4444ff"; ctx.fillRect(C.W-50, C.H/2 - C.GOAL_W/2, 40, C.GOAL_W);

            // Postes
            game.posts.forEach(p => {
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(p.x, p.y, C.POST_R, 0, Math.PI*2); ctx.fill();
            });

            // Jogadores e Bola
            [game.p1, game.p2, game.ball].forEach((obj, i) => {
                ctx.save();
                ctx.beginPath();
                ctx.fillStyle = obj.color || '#fff';
                let isBall = (i === 2);
                let r = isBall ? C.R_BALL : C.R_PLAYER;
                ctx.arc(obj.x, obj.y, r, 0, Math.PI*2);
                
                // Efeito de Chuto
                if(!isBall && obj.kickT > 0) {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4 + (obj.kickT/3);
                    ctx.shadowColor = '#fff'; ctx.shadowBlur = 15; ctx.stroke();
                } else {
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.fill();
                ctx.restore();
            });
        }

        // --- LÓGICA DE JOGO (SÓ CORRE NO HOST/PC) ---
        const keys = {};
        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') keys.kickPending = true; };
        window.onkeyup = e => { keys[e.code] = false; if(e.code === 'Space') keys.kickPending = false; };

        function resolveCollision(c1, c2, r1, r2, isPlayer1, isPlayer2) {
            let dx = c2.x - c1.x; let dy = c2.y - c1.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < r1 + r2) {
                let overlap = (r1 + r2) - dist;
                let nx = dx / dist; let ny = dy / dist; // Vetor Normal
                
                // Afastar
                c1.x -= nx * overlap/2; c1.y -= ny * overlap/2;
                c2.x += nx * overlap/2; c2.y += ny * overlap/2;

                // Física de Impacto (Transferência de Momento)
                let v1n = c1.vx * nx + c1.vy * ny;
                let v2n = c2.vx * nx + c2.vy * ny;
                
                let bounce = 1.0;
                if(isPlayer1 || isPlayer2) { // Jogador vs Bola
                    let p = isPlayer1 ? c1 : c2;
                    let b = isPlayer1 ? c2 : c1;
                    
                    // Chuto
                    if(p.kickT > 0 && dist < r1 + r2 + C.KICK_RANGE) {
                        b.vx += nx * C.KICK_FORCE; b.vy += ny * C.KICK_FORCE;
                        p.kickT = 0; // Gasta o chuto
                    } else { // Toque normal
                        let p_speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                        let bonus = p_speed * 0.3;
                        b.vx = nx * (5 + bonus); b.vy = ny * (5 + bonus);
                    }
                } else { // Bola vs Poste ou Parede
                    c1.vx -= 2 * v1n * nx * C.B_BOUNCE; c1.vy -= 2 * v1n * ny * C.B_BOUNCE;
                }
            }
        }

        function gameLoop() {
            if (!conn || !game.isHost) { requestAnimationFrame(draw); return; }

            // 1. Processar Inputs Host (P1)
            let hIn = { x: (keys.ArrowLeft?-1:0) + (keys.ArrowRight?1:0), y: (keys.ArrowUp?-1:0) + (keys.ArrowDown?1:0), kick: keys.kickPending };
            game.p1.input = hIn; if(hIn.kick) { game.p1.kickT = 10; keys.kickPending = false; }

            // 2. Física Jogadores
            [game.p1, game.p2].forEach(p => {
                if(p.kickT > 0) p.kickT--;
                let ax = p.input.x || 0; let ay = p.input.y || 0;
                if(ax !== 0 && ay !== 0) { ax *= 0.707; ay *= 0.707; } // Normalizar diagonal
                
                p.vx += ax * C.P_ACCEL; p.vy += ay * C.P_ACCEL;
                p.vx *= C.P_DRAG; p.vy *= C.P_DRAG;
                p.x += p.vx; p.y += p.vy;

                // Colisão Bordas Campo
                p.x = Math.max(50 + C.R_PLAYER, Math.min(C.W-50-C.R_PLAYER, p.x));
                p.y = Math.max(50 + C.R_PLAYER, Math.min(C.H-50-C.R_PLAYER, p.y));
            });

            // 3. Física Bola
            game.ball.vx *= C.B_DRAG; game.ball.vy *= C.B_DRAG;
            game.ball.x += game.ball.vx; game.ball.y += game.ball.vy;

            // Colisão Bola vs Paredes (com ressalto)
            if (game.ball.y < 50 + C.R_BALL || game.ball.y > C.H-50-C.R_BALL) { game.ball.vy *= -C.B_BOUNCE; game.ball.y = Math.max(50+C.R_BALL, Math.min(C.H-50-C.R_BALL, game.ball.y)); }
            if (game.ball.x < 50 + C.R_BALL || game.ball.x > C.W-50-C.R_BALL) {
                // Detectar Golo
                if (game.ball.y > C.H/2 - C.GOAL_W/2 && game.ball.y < C.H/2 + C.GOAL_W/2) {
                    if(!game.goalScored) scoreGoal(game.ball.x < C.W/2 ? 'blue' : 'red');
                } else { // Parede normal
                    game.ball.vx *= -C.B_BOUNCE; game.ball.x = Math.max(50+C.R_BALL, Math.min(C.W-50-C.R_BALL, game.ball.x));
                }
            }

            // 4. Colisões Dinâmicas (Física Real)
            resolveCollision(game.p1, game.p2, C.R_PLAYER, C.R_PLAYER); // P1 vs P2
            resolveCollision(game.p1, game.ball, C.R_PLAYER, C.R_BALL, true, false); // P1 vs Bola
            resolveCollision(game.p2, game.ball, C.R_PLAYER, C.R_BALL, false, true); // P2 vs Bola
            game.posts.forEach(p => resolveCollision(game.ball, p, C.R_BALL, C.POST_R, false, false)); // Bola vs Postes

            // 5. Enviar estado para cliente
            conn.send({ p1: game.p1, p2: game.p2, ball: game.ball, score: game.score });
            
            draw(); requestAnimationFrame(gameLoop);
        }

        function scoreGoal(team) {
            game.goalScored = true;
            if(team === 'red') game.score.red++; else game.score.blue++;
            updateScore();
            document.body.style.background = team==='red'?'#522':'#225'; // Feedback visual
            setTimeout(resetGame, 2000);
        }

        function resetGame() {
            game.ball = { x: C.W/2, y: C.H/2, vx: 0, vy: 0 };
            game.p1.x = C.W*0.2; game.p1.y = C.H/2; game.p1.vx=0; game.p1.vy=0;
            game.p2.x = C.W*0.8; game.p2.y = C.H/2; game.p2.vx=0; game.p2.vy=0;
            game.goalScored = false; document.body.style.background = '#1a1a1a';
        }

        function updateScore() {
            document.getElementById('score-red').innerText = game.score.red;
            document.getElementById('score-blue').innerText = game.score.blue;
        }

        // --- MOBILE CONTROLS (Nipple.js virtual joystick) ---
        function isMobile() { return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent); }
        
        // Carregar biblioteca externa de joystick só se for mobile
        if(isMobile()) {
            let s = document.createElement('script'); s.src = "https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js";
            document.head.appendChild(s);
            s.onload = () => {
                let j = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: {left: '80px', bottom: '80px'}, color: 'white' });
                j.on('move', (e, d) => { clientInput.x = d.vector.x; clientInput.y = -d.vector.y; });
                j.on('end', () => { clientInput.x = 0; clientInput.y = 0; });
            }
        }

        let clientInput = { x: 0, y: 0, kick: false };
        const kickBtn = document.getElementById('kick-btn');
        
        // Botão de Chuto Mobile
        if(isMobile()) {
            kickBtn.addEventListener('touchstart', e => { e.preventDefault(); clientInput.kick = true; kickBtn.classList.add('active'); });
            kickBtn.addEventListener('touchend', e => { clientInput.kick = false; kickBtn.classList.remove('active'); });
        }

        // Envio de Inputs do Cliente (Telemóvel)
        setInterval(() => {
            if(conn && !game.isHost) {
                conn.send(clientInput);
                if(clientInput.kick) clientInput.kick = false; // "Pulso" do chuto
            }
        }, 1000/60); // 60hz inputs

        // Iniciar Ciclo
        gameLoop();
    </script>
</body>
</html>
