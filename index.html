<!DOCTYPE html>
<html>
<head>
    <title>Mini HaxBall P2P</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        canvas { background: #355e3b; border: 5px solid #fff; max-width: 95vw; max-height: 70vh; margin-top: 10px; }
        .menu { padding: 20px; }
        input { padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        #joystick-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; }
        .touch-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid #fff; }
    </style>
</head>
<body>

    <div class="menu" id="setup">
        <h2>Mini HaxBall</h2>
        <p>O teu ID: <strong id="my-id">...</strong></p>
        <input type="text" id="peer-id" placeholder="ID do Amigo">
        <button onclick="connectToPeer()">Conectar</button>
    </div>

    <div id="game-info" style="display:none;">Conectado!</div>
    <canvas id="field" width="600" height="400"></canvas>

    <div id="joystick-container">
        <p>Usa o ecrã para mover (Toque)</p>
    </div>

    <script>
        const canvas = document.getElementById('field');
        const ctx = canvas.getContext('2d');
        let peer, conn;
        
        // Estado do Jogo
        const game = {
            p1: { x: 50, y: 200, r: 15, color: 'red' },
            p2: { x: 550, y: 200, r: 15, color: 'blue' },
            ball: { x: 300, y: 200, r: 10, vx: 0, vy: 0 },
            isHost: false
        };

        const keys = {};
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;

        // PeerJS Setup
        peer = new Peer();
        peer.on('open', id => document.getElementById('my-id').innerText = id);

        // Lógica de Conexão
        function connectToPeer() {
            const id = document.getElementById('peer-id').value;
            conn = peer.connect(id);
            setupConn();
        }

        peer.on('connection', c => {
            conn = c;
            game.isHost = true;
            setupConn();
        });

        function setupConn() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-info').style.display = 'block';
            if (window.innerHeight < window.innerWidth) { // Se for mobile
                document.getElementById('joystick-container').style.display = 'block';
            }

            conn.on('data', data => {
                if (game.isHost) {
                    // Recebe input do telemóvel
                    if (data.type === 'input') movePlayer(game.p2, data.keys);
                } else {
                    // Recebe estado do jogo do PC
                    Object.assign(game.p1, data.p1);
                    Object.assign(game.p2, data.p2);
                    Object.assign(game.ball, data.ball);
                }
            });
        }

        function movePlayer(player, input) {
            const speed = 4;
            if (input.Up) player.y -= speed;
            if (input.Down) player.y += speed;
            if (input.Left) player.x -= speed;
            if (input.Right) player.x += speed;
        }

        function update() {
            if (!conn) return;

            if (game.isHost) {
                // Lógica de movimento local do PC (P1)
                const p1Input = { Up: keys.KeyW || keys.ArrowUp, Down: keys.KeyS || keys.ArrowDown, Left: keys.KeyA || keys.ArrowLeft, Right: keys.KeyD || keys.ArrowRight };
                movePlayer(game.p1, p1Input);

                // Física básica da bola
                game.ball.x += game.ball.vx;
                game.ball.y += game.ball.vy;
                game.ball.vx *= 0.98; // Atrito
                game.ball.vy *= 0.98;

                // Colisão simples Jogador-Bola
                [game.p1, game.p2].forEach(p => {
                    let dx = game.ball.x - p.x;
                    let dy = game.ball.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < p.r + game.ball.r) {
                        game.ball.vx = dx * 0.2;
                        game.ball.vy = dy * 0.2;
                    }
                });

                // Bordas
                if (game.ball.y < 0 || game.ball.y > canvas.height) game.ball.vy *= -1;
                if (game.ball.x < 0 || game.ball.x > canvas.width) {
                    game.ball.x = 300; game.ball.y = 200; // Golo / Reset
                    game.ball.vx = 0; game.ball.vy = 0;
                }

                // Envia estado para o telemóvel
                conn.send({ p1: game.p1, p2: game.p2, ball: game.ball });
            } else {
                // Se for o cliente (telemóvel), envia os inputs
                const myInput = { 
                    Up: keys.ArrowUp || keys.KeyW, 
                    Down: keys.ArrowDown || keys.KeyS, 
                    Left: keys.ArrowLeft || keys.KeyA, 
                    Right: keys.ArrowRight || keys.KeyD 
                };
                conn.send({ type: 'input', keys: myInput });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Balizas
            ctx.strokeStyle = "white";
            ctx.strokeRect(0, 150, 20, 100);
            ctx.strokeRect(580, 150, 20, 100);

            // Jogadores
            [game.p1, game.p2].forEach(p => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
            });

            // Bola
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(game.ball.x, game.ball.y, game.ball.r, 0, Math.PI*2);
            ctx.fill();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();

        // Suporte para Touch (Mobile)
        canvas.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const tx = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const ty = (touch.clientY - rect.top) * (canvas.height / rect.height);
            
            // Simular setas baseado na posição do toque relativo ao jogador
            keys.ArrowUp = ty < game.p2.y;
            keys.ArrowDown = ty > game.p2.y;
            keys.ArrowLeft = tx < game.p2.x;
            keys.ArrowRight = tx > game.p2.x;
        });
        canvas.addEventListener('touchend', () => {
            keys.ArrowUp = keys.ArrowDown = keys.ArrowLeft = keys.ArrowRight = false;
        });

    </script>
</body>
</html>
