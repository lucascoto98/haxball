<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coto-Craft: Servidor Ativo</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #7fb3d5; font-family: 'Courier New', monospace; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        /* INTERFACE INICIAL */
        #menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .btn { padding: 15px 40px; background: #5a8e44; border: 4px solid #fff; color: white; font-size: 22px; cursor: pointer; font-weight: bold; margin: 10px; }
        #status { font-size: 14px; color: #0f0; margin-top: 10px; }

        /* HUD */
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; z-index: 100; border: 2px solid #fff; border-radius: 50%; mix-blend-mode: difference; }
        #arm { position: fixed; bottom: -60px; right: 10%; width: 150px; height: 250px; background: #c68642; border: 5px solid #91602d; transform: rotate(-10deg); z-index: 90; pointer-events: none; transition: 0.1s; }

        /* CONTROLO MÓVEL */
        #m-hud { position: fixed; bottom: 20px; left: 20px; display: none; gap: 10px; z-index: 110; pointer-events: none; }
        .m-btn { width: 65px; height: 65px; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: white; display: flex; align-items: center; justify-content: center; border-radius: 10px; pointer-events: auto; }
        #m-jump { position: fixed; bottom: 40px; right: 40px; width: 80px; height: 80px; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 40px;">COTO-CRAFT ONLINE</h1>
    <button class="btn" onclick="entrar('creative')">MODO CRIATIVO</button>
    <button class="btn" onclick="entrar('survival')" style="background:#444">SOBREVIVÊNCIA</button>
    <div id="status">Servidor configurado! ✅</div>
</div>

<div id="crosshair"></div>
<div id="arm"></div>

<div id="m-hud">
    <div class="m-btn" id="btn-w">W</div>
    <div class="m-btn" id="btn-s">S</div>
</div>
<div class="m-btn" id="m-jump" style="display:none">JUMP</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// --- O TEU SERVIDOR ---
const SERVER_URL = "https://311e055a-c343-438d-8f11-fe3b923c26b4-00-2qka2jkd4ftgl.kirk.replit.dev";

let scene, camera, renderer, socket, arm, mode;
let move = { f: 0, b: 0 }, players = {}, blocks = [];
let velY = 0, canJump = false;

function entrar(m) {
    mode = m;
    document.getElementById('menu').style.display = 'none';
    if ("ontouchstart" in window) {
        document.getElementById('m-hud').style.display = 'flex';
        document.getElementById('m-jump').style.display = 'flex';
    }
    
    // Inicia Socket
    try {
        socket = io(SERVER_URL);
        socket.on('playerUpdate', (data) => {
            for (let id in data) {
                if (id !== socket.id) {
                    if (!players[id]) {
                        const g = new THREE.BoxGeometry(0.6, 1.8, 0.6);
                        const m = new THREE.MeshBasicMaterial({ color: 0x0000ff }); // Amigos são azuis
                        players[id] = new THREE.Mesh(g, m);
                        scene.add(players[id]);
                    }
                    players[id].position.lerp(new THREE.Vector3(data[id].x, data[id].y, data[id].z), 0.2);
                }
            }
        });
        socket.on('playerLeft', (id) => { if(players[id]) { scene.remove(players[id]); delete players[id]; } });
    } catch(e) { console.log("Sem servidor."); }

    init3D();
}

function init3D() {
    arm = document.getElementById('arm');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x7fb3d5);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 0);

    renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    // Chão Inicial
    const floor = new THREE.Mesh(new THREE.BoxGeometry(50, 1, 50), new THREE.MeshStandardMaterial({color: 0x3d9e3d}));
    floor.position.y = -0.5;
    scene.add(floor);

    setupInputs();
    animate();
}

function setupInputs() {
    window.onkeydown = e => { 
        if(e.code==='KeyW') move.f=1; 
        if(e.code==='KeyS') move.b=1; 
        if(e.code==='Space') {
            if(mode==='survival' && canJump) velY=0.22;
            if(mode==='creative') camera.position.y += 0.5;
        }
        if(e.code==='ShiftLeft' && mode==='creative') camera.position.y -= 0.5;
    };
    window.onkeyup = e => { if(e.code==='KeyW') move.f=0; if(e.code==='KeyS') move.b=0; };

    // Mobile
    const btnW = document.getElementById('btn-w');
    btnW.ontouchstart = () => move.f=1; btnW.ontouchend = () => move.f=0;
    document.getElementById('m-jump').ontouchstart = () => { if(canJump) velY=0.22; if(mode==='creative') camera.position.y+=1; };

    // Mouse
    document.body.onclick = () => renderer.domElement.requestPointerLock();
    document.onmousemove = e => {
        if(document.pointerLockElement) {
            camera.rotation.y -= e.movementX * 0.003;
            camera.rotation.x -= e.movementY * 0.003;
            camera.rotation.order = 'YXZ';
        }
    };
}

function animate() {
    requestAnimationFrame(animate);

    // Física
    if(mode === 'survival') {
        velY -= 0.01; camera.position.y += velY;
        if(camera.position.y < 2) { camera.position.y = 2; velY = 0; canJump = true; }
    }

    // Movimento
    let dir = new THREE.Vector3();
    camera.getWorldDirection(dir);
    dir.y = 0; dir.normalize();
    if(move.f) camera.position.addScaledVector(dir, 0.15);
    if(move.b) camera.position.addScaledVector(dir, -0.15);

    // Balanço do Braço
    if(move.f) arm.style.bottom = (-60 + Math.sin(Date.now()*0.01)*10)+"px";

    // Enviar Posição ao Replit
    if(socket && socket.connected) {
        socket.emit('move', { x: camera.position.x, y: camera.position.y, z: camera.position.z });
    }

    renderer.render(scene, camera);
}
</script>
</body>
</html>
